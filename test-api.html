<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .response {
            background-color: #f5f5f5;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
        }
        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h2>API Testing</h2>
    
    <h3>Register</h3>
    <input type="text" id="regName" placeholder="Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Password">
    <select id="regRole">
        <option value="StandardUser">Standard User</option>
        <option value="Organizer">Organizer</option>
        <option value="Admin">Admin</option>
    </select>
    <button onclick="register()">Register</button>
    <div id="registerResponse" class="response"></div>

    <h3>Login</h3>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="loginResponse" class="response"></div>

    <script>
        async function register() {
            const data = {
                name: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                role: document.getElementById('regRole').value
            };

            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                document.getElementById('registerResponse').innerText = JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('registerResponse').innerText = 'Error: ' + error.message;
            }
        }

        async function login() {
            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                document.getElementById('loginResponse').innerText = JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('loginResponse').innerText = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
